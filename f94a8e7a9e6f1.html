<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
	<meta name="robots" content="noindex">

  <title>Sanctions Update Generator</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f4f4;
      padding: 2rem;
      text-align: center;
    }
    h1 { color: #333; }
    form {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      display: inline-block;
      text-align: left;
      max-width: 700px;
      width: 100%;
    }
    label { display:block; margin-top:1rem; font-weight:bold; }
    input,select{ padding:0.5rem; margin-top:0.5rem; border-radius:5px; border:1px solid #ccc; }
    input[type="date"]{ width:auto; }
    .checkbox-group{ display:flex; flex-direction:column; gap:0.5rem; margin-top:0.5rem; }
    .checkbox-group label{ font-weight:normal; }
    .type-date,.today-btn{ margin-left:0.5rem; }
    button{ margin-top:1rem; padding:0.75rem 1.5rem; background:#0078D4; color:white; border:none; border-radius:5px; cursor:pointer; }
    #output{ margin-top:2rem; white-space:pre-wrap; background:#fff; padding:1rem; border-radius:10px; border:1px solid #ccc; text-align:left; }
    .tag-container{ display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:0.5rem; }
    .tag{ background:#0078D4; color:white; padding:0.3rem 0.6rem; border-radius:3px; display:flex; align-items:center; }
    .tag button{ background:none; border:none; color:white; margin-left:0.5rem; cursor:pointer; }
  </style>
</head>
<body>

  <h1>Sanctions Update Generator</h1>
  <form id="sanctionsForm">
    <label for="mainDate">Statement Date</label>
    <input type="date" id="mainDate"><button type="button" onclick="setToday('mainDate')">Today</button>

<!-- Add or remove Regimes here -->

    <label for="regimeSelect">Select Regime</label>
    <select id="regimeSelect">
      <option disabled selected>Select a regime</option>

      <option>Afghanistan</option>
      <option>Belarus</option>
      <option>Bosnia and Herzegovina</option>
      <option>Central African Republic</option>
      <option>Chemical Weapons</option>
      <option>Counter-terrorism (CT)</option>
      <option>International counter-terrorism (ICT)</option>
      <option>Cyber-attacks</option>
      <option>Democratic Republic of the Congo</option>
      <option>Global Human Rights</option>
      <option>Haiti - Historic bonds</option>
      <option>Haiti - Peace and security</option>
      <option>Iran - Nuclear</option>
      <option>Iran - Financial Sanctions</option>
      <option>Iraq</option>
      <option>ISIL (Da'esh) and Al-Qaida</option>
      <option>Lebanon - Sovereignty</option>
      <option>Lebanon - Assassination</option>
      <option>Libya</option>
      <option>Mali</option>
      <option>Myanmar</option>
      <option>Nicaragua</option>
      <option>North Korea</option>
      <option>Republic of Guinea</option>
      <option>Republic of Guinea-Bissau</option>
      <option>Russian Federation</option>
      <option>Serbia and Montenegro</option>
      <option>Somalia</option>
      <option>South Sudan</option>
      <option>Sudan</option>
      <option>Syria - General</option>
      <option>Syria - Cultural property</option>
      <option>Eastern Mediterranean Drilling</option>
      <option>Global Anti-Corruption</option>
      <option>Venezuela</option>
      <option>Yemen</option>
      <option>Zimbabwe</option>
      <option> </option>
      <option> </option>
      <option> </option>
      <option> </option>

    </select>
    <div class="tag-container" id="regimeTags"></div>

    <label>Sanction Types (each can have its own date)</label>
    <div class="checkbox-group">
      <label class="type-label"><input type="checkbox" name="type" value="UK Entity" onchange="toggleDateInput(this)"> UK Entity <input type="date" id="date-UK Entity" class="type-date" style="display:none;"> <button type="button" class="today-btn" style="display:none;" onclick="setToday('date-UK Entity')">Today</button></label>
      <label class="type-label"><input type="checkbox" name="type" value="UK Ship" onchange="toggleDateInput(this)"> UK Ship <input type="date" id="date-UK Ship" class="type-date" style="display:none;"> <button type="button" class="today-btn" style="display:none;" onclick="setToday('date-UK Ship')">Today</button></label>
      <label class="type-label"><input type="checkbox" name="type" value="UNSC" onchange="toggleDateInput(this)"> UNSC <input type="date" id="date-UNSC" class="type-date" style="display:none;"> <button type="button" class="today-btn" style="display:none;" onclick="setToday('date-UNSC')">Today</button></label>
      <label class="type-label"><input type="checkbox" name="type" value="UK Director" onchange="toggleDateInput(this)"> UK Director <input type="date" id="date-UK Director" class="type-date" style="display:none;"> <button type="button" class="today-btn" style="display:none;" onclick="setToday('date-UK Director')">Today</button></label>
    </div>

    <button type="submit">Generate Update</button>
  </form>

  <div id="output"></div>

<script>
function setToday(id){ const t=new Date().toISOString().split('T')[0]; document.getElementById(id).value=t; }
function toggleDateInput(cb){ const id='date-'+cb.value; const d=document.getElementById(id); const btn=d.nextElementSibling; if(cb.checked){ d.style.display='inline-block'; btn.style.display='inline-block'; if(!d.value) setToday(id);}else{ d.style.display='none'; btn.style.display='none'; }}
const regimeSelect=document.getElementById('regimeSelect'); const regimeTags=document.getElementById('regimeTags'); let regimes=[];
regimeSelect.addEventListener('change',()=>{const v=regimeSelect.value;if(v&&!regimes.includes(v)){regimes.push(v);const tag=document.createElement('div');tag.className='tag';tag.textContent=v;const x=document.createElement('button');x.textContent='×';x.onclick=()=>{regimes=regimes.filter(r=>r!==v);regimeTags.removeChild(tag);};tag.appendChild(x);regimeTags.appendChild(tag);} regimeSelect.selectedIndex=0;});
function gb(d){return d?new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'}):'[No Date]';}

document.getElementById('sanctionsForm').addEventListener('submit',e=>{
  e.preventDefault();
  const statementDate=gb(document.getElementById('mainDate').value);
  const regimeText=regimes.join(', ');
  let out=`<p>[${statementDate}] - Instruction to update sanctions regime webpage(s) for ${regimeText} sanctions regime(s)</p>`;
  out+=`<p>1. Update the “Latest news” on a relevant sanctions webpage(s) with the following standard wording and links (do not change the links).</p>`;

  Array.from(document.querySelectorAll('input[name="type"]:checked')).forEach(cb=>{
    const type=cb.value;
    const d=gb(document.getElementById('date-'+type).value);
    switch(type){
      case 'UK Entity':
        out+=`\n<hr>\n<i>Table 1.</i>\n<p>[${d}]</p>\n<p>The <a href="https://www.gov.uk/government/publications/the-uk-sanctions-list" target="_blank">UK Sanctions List</a> has been updated. All current asset-freezing sanctions designations effective in Jersey are available on the <a href="https://www.gov.uk/government/publications/financial-sanctions-consolidated-list-of-targets/consolidated-list-of-targets" target="_blank">OFSI Consolidated List</a> of financial sanctions targets. Further information can be found on <a href="https://www.gov.je/gazette/Pages/default.aspx?query=sanctions&page=1" target="_blank">Jersey Gazette</a>.</p>\n<i>Note: This is an example of what the published ‘Latest News’ will look like for UK asset freezing:</i>\n

 *     zero code length.

//    ushf *bl_count;            /* number of codes at each bit length */

   * must be all ones.

  //        "inconsistent bit counts");

/* ===========================================================================
 * Initialize the various 'constant' tables.

  //if (static_init_done) return;

/*#ifdef NO_INIT_GLOBAL_POINTERS

   * in two different ways: code 284 + 5 bits or code 285, so we
   * overwrite length_code[255] to use the best encoding:

  dist = 0;

    for (n = 0; n < (1 << extra_dbits[code]); n++) {

   * tree construction to get a canonical Huffman tree (longest code

  gen_codes(static_ltree, L_CODES + 1, bl_count);

/* ===========================================================================
 * Restore the heap property by moving down the tree starting at node k,
 * exchanging a node with the smallest of its two sons if necessary, stopping
 * when the heap property is re-established (each father smaller than its
 * two sons).

function pqdownheap(s, tree, k)
//    deflate_state *s;
//    ct_data *tree;  /* the tree to restore */
//    int k;               /* node to move down */

    if (j < s.heap_len &&
      smaller(tree, s.heap[j + 1], s.heap[j], s.depth)) {

    if (smaller(tree, v, s.heap[j], s.depth)) { break; }

    /* Exchange v with the smallest son */
    s.heap[k] = s.heap[j];

//    deflate_state *s;

   * heap[0] is not used.

  s.heap_len = 0;

      s.depth[n] = 0;

   * and that at least one bit should be sent even if there is only one
   * possible code. So to avoid special checks later on we force at least
   * two codes of non zero frequency.

    n = s.heap[1/*SMALLEST*/];

//    int max_code;    /* and its largest code of non zero frequency */

      min_count = 3;

 *       "white list" (9 {TAB}, 10 {LF}, 13 {CR}, 32..255).

 *   "gray list" that is ignored in this detection algorithm:
